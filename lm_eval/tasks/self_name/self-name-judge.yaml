task: self-name-judge
tag:
  - self_name
custom_dataset: !function utils.create_dataset
output_type: generate_until
validation_split: validation
doc_to_text: prompt
doc_to_target: ""
process_results: !function utils.process_results_llm_judge
metric_list:
  - metric: llm_correct_naming_rate
    aggregation: nanmean
    higher_is_better: true
  - metric: llm_incorrect_naming_rate
    aggregation: nanmean
    higher_is_better: false
  - metric: llm_clean_correct_naming_rate
    aggregation: nanmean
    higher_is_better: true
generation_kwargs:
  until: []
  do_sample: false
  temperature: 0.0
  max_gen_toks: 64
metadata:
  version: 0.1
