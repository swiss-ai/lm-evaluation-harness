tag:
  - llm_judge
  - swiss_ai
custom_dataset: !function utils.create_dataset
output_type: generate_until
test_split: test
doc_to_text: prompt
doc_to_target: ""
process_results: !function utils.process_results
metric_list:
  - metric: swiss_ai_charter_score
    aggregation: !function utils.swiss_ai_charter_agg
    higher_is_better: true
  - metric: swiss_ai_charter_judge_success_rate
    aggregation: !function utils.swiss_ai_charter_success_agg
    higher_is_better: true
  - metric: swiss_ai_charter_pairwise_winrate
    aggregation: !function utils.swiss_ai_charter_pairwise_winrate_agg
    higher_is_better: true
  - metric: swiss_ai_charter_length_controlled_winrate
    aggregation: !function utils.swiss_ai_charter_length_controlled_winrate_agg
    higher_is_better: true
  - metric: swiss_ai_charter_pairwise_judge_success_rate
    aggregation: !function utils.swiss_ai_charter_pairwise_success_agg
    higher_is_better: true
  - metric: avg_word_count
    aggregation: mean
    higher_is_better: false
generation_kwargs:
  until: []
  do_sample: false
  temperature: 0.0
  max_gen_toks: 512
metadata:
  version: 1.1
