# Umbrella S-RuLES group. Composed of two sub-groups so one run surfaces all
# the headline numbers at once:
#   * realguardrails_s_rules_br      — br_average: unweighted mean over the 4
#                                      basic/redteam buckets (the paper's
#                                      "S-RULES" headline; benign excluded).
#   * realguardrails_s_rules_benign  — benign baseline (2 buckets).
# The group's own `passed` metric is the unweighted mean over all 6 leaf
# buckets (aggregation flattens nested sub-groups to their leaf tasks), which
# matches the full RuLES score upstream `read_scores.py` exposes via
# `--averaged`. So `realguardrails_s_rules` reports: the full 6-bucket mean
# (this group), the `realguardrails_s_rules_br` headline (br_average, benign
# excluded), the `realguardrails_s_rules_benign` baseline, and the 6 per-bucket
# rows.
group: realguardrails_s_rules
group_alias: "RealGuardrails / S-RuLES (all 6 buckets)"
task:
  - realguardrails_s_rules_br
  - realguardrails_s_rules_benign
aggregate_metric_list:
  - metric: passed
    aggregation: mean
    weight_by_size: false
metadata:
  # 0.2: umbrella now nests the _br + _benign sub-groups (was a flat list of 6
  # leaves) so one run also emits br_average and benign baselines. Leaf scores
  # and the 6-bucket mean are unchanged.
  version: 0.2
